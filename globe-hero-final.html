<title>Framework Globe Hero</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F7F9FC;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px 20px;
  }

  .hero-wrap {
    position: relative;
    width: 680px;
    height: 680px;
    flex-shrink: 0;
  }

  /* ── Globe ── */
  .globe-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ── Framework node ── */
  .fw-node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 20;
  }

  .fw-badge {
    width: 62px;
    height: 62px;
    background: #ffffff;
    border-radius: 18px;
    border: 1.5px solid #E5E7EB;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: none;
    transition: border-color 0.2s, transform 0.2s;
  }
  .fw-node:hover .fw-badge {
    border-color: #1D4ED8;
    transform: scale(1.06);
  }

  .fw-label {
    font-size: 9px;
    font-weight: 700;
    color: #475569;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.02em;
    pointer-events: none;
  }

  /* ── Float animations (staggered per node) ── */
  @keyframes float {
    0%, 100% { transform: translate(-50%, -50%) translateY(0px);   }
    50%       { transform: translate(-50%, -50%) translateY(-8px);  }
  }
  .fw-node:nth-child(1)  { animation: float 5.0s ease-in-out infinite 0.0s; }
  .fw-node:nth-child(2)  { animation: float 5.3s ease-in-out infinite 0.6s; }
  .fw-node:nth-child(3)  { animation: float 4.8s ease-in-out infinite 1.2s; }
  .fw-node:nth-child(4)  { animation: float 5.6s ease-in-out infinite 1.8s; }
  .fw-node:nth-child(5)  { animation: float 5.1s ease-in-out infinite 2.4s; }
  .fw-node:nth-child(6)  { animation: float 4.7s ease-in-out infinite 0.4s; }
  .fw-node:nth-child(7)  { animation: float 5.4s ease-in-out infinite 1.0s; }
  .fw-node:nth-child(8)  { animation: float 4.9s ease-in-out infinite 1.6s; }

  /* ── Globe pulse ── */
  @keyframes globe-breathe {
    0%, 100% { opacity: 0.97; }
    50%       { opacity: 1;    }
  }
  .globe-circle { animation: globe-breathe 4s ease-in-out infinite; }

</style>
</head>
