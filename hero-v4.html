<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hero — Framework Orbit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050e1f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:40px 20px}
.scene{position:relative;width:660px;height:660px}
.glow-deep{position:absolute;top:50%;left:50%;width:420px;height:320px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(29,78,216,.38) 0%,rgba(20,60,190,.14) 40%,rgba(10,30,120,.05) 65%,transparent 80%);animation:breathe 3.6s ease-in-out infinite;pointer-events:none}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1}}
.nd{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px;transform:translate(-50%,-50%);z-index:15;cursor:pointer}
.ir{width:58px;height:58px;background:#071526;border:1.5px solid rgba(29,78,216,.42);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.55),0 0 10px rgba(29,78,216,.10);transition:border-color .22s,box-shadow .22s}
.nd:hover .ir{border-color:rgba(29,78,216,.85);box-shadow:0 3px 20px rgba(0,0,0,.6),0 0 20px rgba(29,78,216,.32)}
.lb{font-size:9px;font-weight:600;color:rgba(155,190,255,.58);text-align:center;white-space:nowrap;line-height:1.2;pointer-events:none}
.a0{animation:fl 5.0s ease-in-out infinite 0.0s}.a1{animation:fl 5.3s ease-in-out infinite .65s}.a2{animation:fl 4.8s ease-in-out infinite 1.3s}.a3{animation:fl 5.5s ease-in-out infinite 1.95s}.a4{animation:fl 5.1s ease-in-out infinite 2.6s}.a5{animation:fl 4.7s ease-in-out infinite .35s}.a6{animation:fl 5.4s ease-in-out infinite 1.0s}.a7{animation:fl 4.9s ease-in-out infinite 1.65s}
@keyframes fl{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-7px)}}
.dot{position:absolute;border-radius:50%;transform:translate(-50%,-50%);z-index:10}
.da{animation:dp 2.2s ease-in-out infinite 0s}.db{animation:dp 2.6s ease-in-out infinite .5s}.dc{animation:dp 2.0s ease-in-out infinite 1s}.dd{animation:dp 2.4s ease-in-out infinite 1.5s}.de{animation:dp 1.9s ease-in-out infinite .3s}.df{animation:dp 2.8s ease-in-out infinite 2s}
@keyframes dp{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(2.1)}}
.dmd{position:absolute;width:9px;height:9px;background:rgba(29,78,216,.38);border:1.5px solid rgba(74,144,226,.38);transform:translate(-50%,-50%) rotate(45deg)}
</style>
</head>
<body>

  <line x1="496" y1="162" x2="330" y2="565" stroke="#4A90E2" stroke-width="0.4" opacity="0.07"/>

  <!-- CLOUD — drawn in SVG, center=330,310 -->

  <circle cx="220" cy="308" r="36" fill="#9dc4f0" opacity="0.72"/>
  <circle cx="284" cy="285" r="46" fill="#b0d0f4" opacity="0.76"/>

  <!-- Glow line under cloud -->

  <ellipse cx="308" cy="374" rx="88"  ry="7"  fill="#4A90E2" opacity="0.16"/>
</svg>
